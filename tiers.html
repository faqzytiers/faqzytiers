<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaqzyTiers - Tiers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-dFgZ5x4CqooFQgqD1uEJy8ih6+qsFyzVzeC1n5L9FeWkYdz5HzfG9nU6P0CIh4LRvD6XsuVGUy0y9trb1j6xgw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <nav class="navbar">
        <div class="logo">FaqzyTiers</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="tiers.html">Tiers</a></li>
        </ul>
        <div class="burger" id="burger">
            <div></div><div></div><div></div>
        </div>
    </nav>
</header>

<main>
    <section class="hero hero-fade tier-hero">
        <div class="hero-fade-bg"></div>
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>FaqzyTiers</h1>
            <p>This page shows all the player tiers across different Minecraft gamemodes.</p>
        </div>
    </section>

    <section class="section">
        <h2>Active Minecraft Players &amp; Current Tiers</h2>
        <div id="modeTabs" class="mode-tabs"></div>
        <div id="tierBoard" class="tier-board"></div>
    </section>
</main>

<footer>
    <p>&copy; 2026 FaqzyTiers. All rights reserved.</p>
</footer>

<script src="script.js"></script>
<script>
const tierBoard = document.getElementById('tierBoard');
const tierSubtitle = document.getElementById('tierSubtitle');
const modeTabs = document.getElementById('modeTabs');
const API_BASE_URL = window.location.origin;

const DEFAULT_MODES = ['Overall', 'Vanilla', 'UHC', 'Pot', 'NethOP', 'SMP', 'Sword', 'Axe', 'Mace'];
const MODE_IMAGE_URLS = {
  Sword: 'https://static.wikia.nocookie.net/minecraft_gamepedia/images/9/9f/Diamond_Sword_%28inventory%29_MCE.png/revision/latest?cb=20210918070719',
  Axe: 'https://static.wikia.nocookie.net/minecraft_gamepedia/images/4/40/Diamond_Axe_JE3_BE3.png/revision/latest?cb=20200226193844',
  NethOP: 'https://static.wikia.nocookie.net/minecraft_gamepedia/images/c/cb/Netherite_Helmet_%28item%29_JE2_BE1.png/revision/latest?cb=20200304193908',
  Pot: 'https://static.wikia.nocookie.net/minecraft_gamepedia/images/0/07/Health_Potion_%28item%29.png/revision/latest?cb=20210401172200',
  SMP: 'https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/7b/Ender_Pearl_JE2_BE1.png/revision/latest?cb=20190501044042',
  UHC: 'https://static.wikia.nocookie.net/minecraft_gamepedia/images/0/00/Lava_Bucket_JE1_BE1.png/revision/latest?cb=20200128152224',
  Mace: 'https://static.wikia.nocookie.net/minecraft_gamepedia/images/0/0f/Mace_%28MCD%29.png/revision/latest?cb=20200531152907'
};

const TIER_POINTS = {
  HT1: 60, LT1: 45,
  HT2: 30, LT2: 20,
  HT3: 10, LT3: 6,
  HT4: 4, LT4: 3,
  HT5: 2, LT5: 1
};

const RANK_CATEGORIES = [
  { min: 400, label: 'Combat Grandmaster', icon: 'fas fa-crown', description: 'Obtained 400+ total points.' },
  { min: 250, label: 'Combat Master', icon: 'fas fa-shield', description: 'Obtained 250+ total points.' },
  { min: 100, label: 'Combat Ace', icon: 'fas fa-star', description: 'Obtained 100+ total points.' },
  { min: 50, label: 'Combat Specialist', icon: 'fas fa-bolt', description: 'Obtained 50+ total points.' },
  { min: 20, label: 'Combat Cadet', icon: 'fas fa-user-graduate', description: 'Obtained 20+ total points.' },
  { min: 10, label: 'Combat Novice', icon: 'fas fa-user', description: 'Obtained 10+ total points.' },
  { min: 0, label: 'Rookie', icon: 'fas fa-seedling', description: 'Starting rank for players with less than 10 points.' }
];

function getModeIconUrl(mode) {
  const key = String(mode || '').trim().toLowerCase();
  if (key.includes('sword')) return MODE_IMAGE_URLS.Sword;
  if (key.includes('axe')) return MODE_IMAGE_URLS.Axe;
  if (key.includes('neth') || key.includes('helmet')) return MODE_IMAGE_URLS.NethOP;
  if (key.includes('pot') || key.includes('potion')) return MODE_IMAGE_URLS.Pot;
  if (key.includes('smp') || key.includes('ender')) return MODE_IMAGE_URLS.SMP;
  if (key.includes('uhc') || key.includes('lava')) return MODE_IMAGE_URLS.UHC;
  if (key.includes('mace')) return MODE_IMAGE_URLS.Mace;
  return null;
}

const BOARD_TIERS = ['Tier 1', 'Tier 2', 'Tier 3', 'Tier 4', 'Tier 5'];
const TIER_PRIORITY = [
  'Unranked',
  'LT5', 'HT5',
  'LT4', 'HT4',
  'LT3', 'HT3',
  'LT2', 'HT2',
  'LT1', 'HT1'
];

function getTierScore(tierName) {
  const idx = TIER_PRIORITY.indexOf(tierName);
  return idx >= 0 ? idx : 0;
}

function getBestTier(tiers) {
  if (!Array.isArray(tiers) || !tiers.length) {
    return { tier: 'Unranked', gamemode: 'Unknown' };
  }
  return tiers.reduce((best, next) => {
    if (!next || typeof next !== 'object') return best;
    const currentScore = getTierScore(best.tier);
    const nextScore = getTierScore(next.tier);
    return nextScore > currentScore ? next : best;
  }, { tier: 'Unranked', gamemode: 'Unknown' });
}

function getTierArrow(tier) {
  if (/^HT/i.test(tier)) return 'ht';
  if (/^LT/i.test(tier)) return 'lt';
  return 'none';
}

function getTierArrowIcon(tier) {
  if (/^HT/i.test(tier)) return '<i class="fas fa-angles-up"></i>';
  if (/^LT/i.test(tier)) return '<i class="fas fa-angle-up"></i>';
  return '<i class="fas fa-circle"></i>';
}

function getPointsForTier(tier) {
  if (typeof tier !== 'string') return 0;
  const normalized = tier.replace(/\s+/g, '').toUpperCase();
  return TIER_POINTS[normalized] || 0;
}

function getTotalPoints(tiers) {
  if (!Array.isArray(tiers) || !tiers.length) return 0;
  return tiers.reduce((sum, tier) => sum + getPointsForTier(tier?.tier), 0);
}

function getRankCategory(points) {
  return RANK_CATEGORIES.find(category => points >= category.min) || RANK_CATEGORIES[RANK_CATEGORIES.length - 1];
}

function truncateUsername(name, maxLength = 7) {
  if (name.length > maxLength) {
    return name.slice(0, maxLength) + '...';
  }
  return name;
}

function normalizeTierGroup(tier) {
  if (typeof tier !== 'string') return 'Tier 5';
  const numericMatch = tier.match(/^(?:HT|LT)?\s*([1-5])$/i);
  if (numericMatch) {
    return `Tier ${numericMatch[1]}`;
  }
  const otherMatch = tier.match(/Tier\s*([1-5])/i);
  if (otherMatch) {
    return `Tier ${otherMatch[1]}`;
  }
  return 'Tier 5';
}

function getAvailableModes(players) {
  const modes = new Set();
  players.forEach(player => {
    const tiers = Array.isArray(player.tiers) ? player.tiers : [];
    tiers.forEach(item => {
      const mode = item?.gamemode || item?.mode;
      if (mode) modes.add(mode);
    });
  });
  return Array.from(modes);
}

function renderModeTab(name, active = false) {
  return `<button class="mode-tab ${active ? 'active' : ''}" data-mode="${name}">${name}</button>`;
}

function renderPlayerItem(player, selectedMode) {
  const ign = player.ign || player.name || player.username || 'Unknown Player';
  const displayName = truncateUsername(ign);
  const tiers = Array.isArray(player.tiers) ? player.tiers : [];
  let tierItem;

  if (selectedMode === 'Overall') {
    tierItem = getBestTier(tiers);
  } else {
    tierItem = tiers.find(item => {
      const modeName = (item?.gamemode || item?.mode || '').toLowerCase();
      return modeName === selectedMode.toLowerCase();
    }) || { tier: 'Unranked', gamemode: selectedMode };
  }

  const arrowHtml = getTierArrowIcon(tierItem.tier);
  const tierLabel = tierItem.tier || 'Unranked';
  const gamemodeLabel = tierItem.gamemode || selectedMode;

  return `
    <article class="tier-player">
      <div class="player-meta">
        <img src="https://minotar.net/avatar/${ign}/36" alt="${ign}" class="player-avatar">
        <div>
          <strong>${displayName}</strong>
        </div>
      </div>
      <span class="tier-pill"><span class="tier-arrow">${arrowHtml}</span> ${tierLabel}</span>
    </article>
  `;
}

function renderTierBoard(players, selectedMode) {
  tierBoard.classList.toggle('overall-active', selectedMode === 'Overall');

  let filtered = players;
  if (selectedMode !== 'Overall') {
    filtered = players.filter(player => {
      const tiers = Array.isArray(player.tiers) ? player.tiers : [];
      return tiers.some(item => {
        const modeName = (item?.gamemode || item?.mode || '').toLowerCase();
        return modeName === selectedMode.toLowerCase();
      });
    });
  }

  if (!filtered.length && selectedMode === 'Overall') {
    tierBoard.innerHTML = '<div class="tier-empty">No players found for this mode.</div>';
    return;
  }

  if (selectedMode === 'Overall') {
    // Overall tab shows ranked list layout
    filtered.sort((a, b) => {
      const pointsA = getTotalPoints(Array.isArray(a.tiers) ? a.tiers : []);
      const pointsB = getTotalPoints(Array.isArray(b.tiers) ? b.tiers : []);
      if (pointsB !== pointsA) return pointsB - pointsA;

      const bestTierA = getBestTier(Array.isArray(a.tiers) ? a.tiers : []).tier;
      const bestTierB = getBestTier(Array.isArray(b.tiers) ? b.tiers : []).tier;
      const tierScoreA = getTierScore(bestTierA);
      const tierScoreB = getTierScore(bestTierB);
      if (tierScoreB !== tierScoreA) return tierScoreB - tierScoreA;

      const nameA = (a.ign || a.name || a.username || '').toLowerCase();
      const nameB = (b.ign || b.name || b.username || '').toLowerCase();
      return nameA.localeCompare(nameB);
    });

    tierBoard.innerHTML = `<div class="overall-ranking">${filtered.map((player, index) => {
      const ign = player.ign || player.name || player.username || 'Unknown Player';
      const tiers = Array.isArray(player.tiers) ? player.tiers : [];
      const totalPoints = getTotalPoints(tiers);
      const category = getRankCategory(totalPoints);
      const tiersHtml = tiers.slice(0, 8).map(tier => {
        const gamemode = tier?.gamemode || tier?.mode || 'Unknown';
        const tierValue = tier?.tier || 'Unranked';
        const iconUrl = getModeIconUrl(gamemode);
        const tierPoints = getPointsForTier(tierValue);
        const iconContent = iconUrl
          ? `<img src="${iconUrl}" alt="${gamemode}" class="tier-icon-img">`
          : '⚔';
        return `<span class="tier-icon" data-tooltip="${gamemode}: ${tierValue} — ${tierPoints} pts">${iconContent}</span>`;
      }).join('');
      
      const region = (player.region || player.Region || player.region?.toString() || 'Unknown').toUpperCase();
      return `
        <article class="ranking-row">
          <div class="ranking-number">${index + 1}.</div>
          <div class="ranking-player">
            <img src="https://minotar.net/avatar/${ign}/48" alt="${ign}" class="player-avatar-lg">
            <div>
              <strong>${ign}</strong>
              <div class="player-category"><i class="${category.icon}"></i> ${category.label}</div>
            </div>
          </div>
          <div class="ranking-tiers">
            ${tiersHtml}
          </div>
          <div class="ranking-region">${region}</div>
        </article>
      `;
    }).join('')}</div>`;
  } else {
    // Other tabs show tier column layout
    const grouped = BOARD_TIERS.reduce((acc, tierName) => {
      acc[tierName] = [];
      return acc;
    }, {});

    filtered.forEach(player => {
      let tierValue = 'Unranked';
      const tiers = Array.isArray(player.tiers) ? player.tiers : [];
      const playerModeTier = tiers.find(item => {
        const modeName = (item?.gamemode || item?.mode || '').toLowerCase();
        return modeName === selectedMode.toLowerCase();
      });
      tierValue = playerModeTier?.tier || 'Unranked';
      const column = normalizeTierGroup(tierValue);
      grouped[column].push(player);
    });

    const sortTierPlayers = playersList => playersList.slice().sort((a, b) => {
      const aTier = (Array.isArray(a.tiers) ? a.tiers : []).find(item => {
        const modeName = (item?.gamemode || item?.mode || '').toLowerCase();
        return modeName === selectedMode.toLowerCase();
      })?.tier || 'Unranked';
      const bTier = (Array.isArray(b.tiers) ? b.tiers : []).find(item => {
        const modeName = (item?.gamemode || item?.mode || '').toLowerCase();
        return modeName === selectedMode.toLowerCase();
      })?.tier || 'Unranked';

      const scoreA = getTierScore(aTier);
      const scoreB = getTierScore(bTier);
      if (scoreB !== scoreA) return scoreB - scoreA;
      const pointsA = getPointsForTier(aTier);
      const pointsB = getPointsForTier(bTier);
      if (pointsB !== pointsA) return pointsB - pointsA;
      return (a.ign || a.name || a.username || '').localeCompare(b.ign || b.name || b.username || '');
    });

    tierBoard.innerHTML = BOARD_TIERS.map(tierName => {
      const playersInTier = sortTierPlayers(grouped[tierName]);
      const content = playersInTier.length
        ? playersInTier.map(player => renderPlayerItem(player, selectedMode)).join('')
        : '<div class="no-players">No players in this tier</div>';

      return `
        <div class="tier-column">
          <div class="tier-column-header">${tierName}</div>
          <div class="tier-column-body">${content}</div>
        </div>
      `;
    }).join('');
  }
}

function setupModeTabs(players) {
  const availableModes = getAvailableModes(players);
  const tabs = DEFAULT_MODES.concat(availableModes.filter(mode => !DEFAULT_MODES.includes(mode)));
  modeTabs.innerHTML = tabs.map((mode, index) => renderModeTab(mode, index === 0)).join('');

  modeTabs.addEventListener('click', event => {
    const button = event.target.closest('.mode-tab');
    if (!button) return;

    const selectedMode = button.dataset.mode;
    modeTabs.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
    button.classList.add('active');
    renderTierBoard(players, selectedMode);
  });

  renderTierBoard(players, tabs[0]);
}

async function loadTierData() {
  try {
    const response = await fetch(`${API_BASE_URL}/api/players`);
    if (!response.ok) {
      throw new Error('Network response was not ok');
    }
    const data = await response.json();

    if (!data || !data.length) {
      tierSubtitle.textContent = 'No tier data found. Make sure your Render backend is running and the Supabase table contains player rows.';
      tierBoard.innerHTML = '<div class="tier-empty">No tier data available.</div>';
      return;
    }
    setupModeTabs(data);
  } catch (err) {
    console.error('Failed to load player tiers:', err);
    tierSubtitle.textContent = 'Failed to load player tiers. Verify the backend URL and that your Render service is running.';
    tierBoard.innerHTML = '<div class="tier-empty">Unable to fetch tiers from the backend.</div>';
  }
}

loadTierData();
</script>
