<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaqzyTiers - Tiers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <nav class="navbar">
        <div class="logo">FaqzyTiers</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="tiers.html">Tiers</a></li>
        </ul>
        <div class="burger" id="burger">
            <div></div><div></div><div></div>
        </div>
    </nav>
</header>

<main>
    <section class="hero hero-fade tier-hero">
        <div class="hero-fade-bg"></div>
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>FaqzyTiers</h1>
            <p>Live tier cards generated from your Supabase player data. Minecraft gamemode icons are shown as placeholders for now.</p>
        </div>
    </section>

    <section class="section">
        <h2>Active Minecraft Players &amp; Tier Progress</h2>
        <p class="tier-empty" id="tierSubtitle">Fetching the latest player tiers from Supabase...</p>
        <div id="modeTabs" class="mode-tabs"></div>
        <div id="tierBoard" class="tier-board"></div>
    </section>
</main>

<footer>
    <p>&copy; 2026 FaqzyTiers. All rights reserved.</p>
</footer>

<script src="script.js"></script>
<script>
const tierBoard = document.getElementById('tierBoard');
const tierSubtitle = document.getElementById('tierSubtitle');
const modeTabs = document.getElementById('modeTabs');
const API_BASE_URL = window.location.origin;

const DEFAULT_MODES = ['Overall', 'Vanilla', 'UHC', 'Pot', 'NethOP', 'SMP', 'Sword', 'Axe', 'Mace'];
const BOARD_TIERS = ['Tier 1', 'Tier 2', 'Tier 3', 'Tier 4', 'Tier 5'];
const TIER_PRIORITY = [
  'Unranked',
  'LT5', 'HT5',
  'LT4', 'HT4',
  'LT3', 'HT3',
  'LT2', 'HT2',
  'LT1', 'HT1'
];

function getTierScore(tierName) {
  const idx = TIER_PRIORITY.indexOf(tierName);
  return idx >= 0 ? idx : 0;
}

function getBestTier(tiers) {
  if (!Array.isArray(tiers) || !tiers.length) {
    return { tier: 'Unranked', gamemode: 'Unknown' };
  }
  return tiers.reduce((best, next) => {
    if (!next || typeof next !== 'object') return best;
    const currentScore = getTierScore(best.tier);
    const nextScore = getTierScore(next.tier);
    return nextScore > currentScore ? next : best;
  }, { tier: 'Unranked', gamemode: 'Unknown' });
}

function getTierArrow(tier) {
  if (/^HT/i.test(tier)) return 'ht';
  if (/^LT/i.test(tier)) return 'lt';
  return 'none';
}

function truncateUsername(name, maxLength = 7) {
  if (name.length > maxLength) {
    return name.slice(0, maxLength) + '...';
  }
  return name;
}

function normalizeTierGroup(tier) {
  if (typeof tier !== 'string') return 'Tier 5';
  const numericMatch = tier.match(/^(?:HT|LT)?\s*([1-5])$/i);
  if (numericMatch) {
    return `Tier ${numericMatch[1]}`;
  }
  const otherMatch = tier.match(/Tier\s*([1-5])/i);
  if (otherMatch) {
    return `Tier ${otherMatch[1]}`;
  }
  return 'Tier 5';
}

function getAvailableModes(players) {
  const modes = new Set();
  players.forEach(player => {
    const tiers = Array.isArray(player.tiers) ? player.tiers : [];
    tiers.forEach(item => {
      const mode = item?.gamemode || item?.mode;
      if (mode) modes.add(mode);
    });
  });
  return Array.from(modes);
}

function renderModeTab(name, active = false) {
  return `<button class="mode-tab ${active ? 'active' : ''}" data-mode="${name}">${name}</button>`;
}

function renderPlayerItem(player, selectedMode) {
  const ign = player.ign || player.name || player.username || 'Unknown Player';
  const displayName = truncateUsername(ign);
  const tiers = Array.isArray(player.tiers) ? player.tiers : [];
  let tierItem;

  if (selectedMode === 'Overall') {
    tierItem = getBestTier(tiers);
  } else {
    tierItem = tiers.find(item => {
      const modeName = (item?.gamemode || item?.mode || '').toLowerCase();
      return modeName === selectedMode.toLowerCase();
    }) || { tier: 'Unranked', gamemode: selectedMode };
  }

  const arrowClass = getTierArrow(tierItem.tier);
  const tierLabel = tierItem.tier || 'Unranked';
  const gamemodeLabel = tierItem.gamemode || selectedMode;

  return `
    <article class="tier-player">
      <div class="player-meta">
        <img src="https://minotar.net/avatar/${ign}/36" alt="${ign}" class="player-avatar">
        <div>
          <strong>${displayName}</strong>
        </div>
      </div>
      <span class="tier-pill"><span class="tier-arrow ${arrowClass}"></span> ${tierLabel}</span>
    </article>
  `;
}

function renderTierBoard(players, selectedMode) {
  let filtered = players;
  if (selectedMode !== 'Overall') {
    filtered = players.filter(player => {
      const tiers = Array.isArray(player.tiers) ? player.tiers : [];
      return tiers.some(item => {
        const modeName = (item?.gamemode || item?.mode || '').toLowerCase();
        return modeName === selectedMode.toLowerCase();
      });
    });
  }

  if (!filtered.length) {
    tierBoard.innerHTML = '<div class="tier-empty">No players found for this mode.</div>';
    return;
  }

  if (selectedMode === 'Overall') {
    // Overall tab shows ranked list layout
    filtered.sort((a, b) => {
      const bestA = getBestTier(Array.isArray(a.tiers) ? a.tiers : []);
      const bestB = getBestTier(Array.isArray(b.tiers) ? b.tiers : []);
      return getTierScore(bestB.tier) - getTierScore(bestA.tier);
    });

    tierBoard.innerHTML = `<div class="overall-ranking">${filtered.map((player, index) => {
      const ign = player.ign || player.name || player.username || 'Unknown Player';
      const tiers = Array.isArray(player.tiers) ? player.tiers : [];
      const bestTier = getBestTier(tiers);
      const tierLabel = bestTier.tier || 'Unranked';
      const arrow = getTierArrow(tierLabel);
      
      const tiersHtml = tiers.slice(0, 8).map(tier => {
        const gamemode = tier?.gamemode || tier?.mode || 'Unknown';
        const tierValue = tier?.tier || 'Unranked';
        return `<span class="tier-icon" title="${gamemode}: ${tierValue}">⚔</span>`;
      }).join('');
      
      return `
        <article class="ranking-row">
          <div class="ranking-number">${index + 1}.</div>
          <div class="ranking-player">
            <img src="https://minotar.net/avatar/${ign}/48" alt="${ign}" class="player-avatar-lg">
            <div>
              <strong>${ign}</strong>
              <div class="player-info">Combat Master</div>
            </div>
          </div>
          <div class="ranking-tiers">
            ${tiersHtml}
          </div>
          <div class="ranking-region">NA</div>
        </article>
      `;
    }).join('')}</div>`;
  } else {
    // Other tabs show tier column layout
    const grouped = BOARD_TIERS.reduce((acc, tierName) => {
      acc[tierName] = [];
      return acc;
    }, {});

    filtered.forEach(player => {
      let tierValue = 'Unranked';
      const tiers = Array.isArray(player.tiers) ? player.tiers : [];
      const playerModeTier = tiers.find(item => {
        const modeName = (item?.gamemode || item?.mode || '').toLowerCase();
        return modeName === selectedMode.toLowerCase();
      });
      tierValue = playerModeTier?.tier || 'Unranked';
      const column = normalizeTierGroup(tierValue);
      grouped[column].push(player);
    });

    tierBoard.innerHTML = BOARD_TIERS.map(tierName => {
      const playersInTier = grouped[tierName];
      const content = playersInTier.length
        ? playersInTier.map(player => renderPlayerItem(player, selectedMode)).join('')
        : '<div class="no-players">No players in this tier</div>';

      return `
        <div class="tier-column">
          <div class="tier-column-header">${tierName}</div>
          <div class="tier-column-body">${content}</div>
        </div>
      `;
    }).join('');
  }
}

function setupModeTabs(players) {
  const availableModes = getAvailableModes(players);
  const tabs = DEFAULT_MODES.concat(availableModes.filter(mode => !DEFAULT_MODES.includes(mode)));
  modeTabs.innerHTML = tabs.map((mode, index) => renderModeTab(mode, index === 0)).join('');

  modeTabs.addEventListener('click', event => {
    const button = event.target.closest('.mode-tab');
    if (!button) return;

    const selectedMode = button.dataset.mode;
    modeTabs.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
    button.classList.add('active');
    renderTierBoard(players, selectedMode);
  });

  renderTierBoard(players, tabs[0]);
}

async function loadTierData() {
  try {
    const response = await fetch(`${API_BASE_URL}/api/players`);
    if (!response.ok) {
      throw new Error('Network response was not ok');
    }
    const data = await response.json();

    if (!data || !data.length) {
      tierSubtitle.textContent = 'No tier data found. Make sure your Render backend is running and the Supabase table contains player rows.';
      tierBoard.innerHTML = '<div class="tier-empty">No tier data available.</div>';
      return;
    }

    tierSubtitle.textContent = 'Select a mode tab above to view tier groups.';
    setupModeTabs(data);
  } catch (err) {
    console.error('Failed to load player tiers:', err);
    tierSubtitle.textContent = 'Failed to load player tiers. Verify the backend URL and that your Render service is running.';
    tierBoard.innerHTML = '<div class="tier-empty">Unable to fetch tiers from the backend.</div>';
  }
}

loadTierData();
</script>
